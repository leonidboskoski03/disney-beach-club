<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4c2517" />
    <meta
      name="description"
      content="A responsive Aulani-style around-the-island television menu screen."
    />
    <title>Around the Island</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Montserrat:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/aulani.css" />
    <script src="../assets/js/aulani.js" defer></script>
  </head>
  <body>
    <main class="aulani-screen around-island-screen">
      <header class="aulani-topbar" aria-label="Resort and room information">
        <a class="aulani-brand" href="../index.html" aria-label="Return to welcome screen">
          <span>Disney’s</span>
          <strong>Beach Club</strong>
          <span>Resort</span>
        </a>
        <p class="aulani-room">Room <span data-room>516</span></p>
      </header>

      <section class="aulani-section-title" aria-label="Current section">
        <svg class="aulani-mark compass-mark" viewBox="0 0 54 54" aria-hidden="true">
          <circle cx="27" cy="27" r="16" />
          <path d="M27 5v9M27 40v9M5 27h9M40 27h9M16 16l7 15 15 7-7-15-15-7Z" />
        </svg>
        <h1>Around the Island</h1>
      </section>

      <section class="aulani-card-grid around-island-grid" aria-label="Around the island categories">
        <a class="aulani-card is-active" href="#excursions">
          <span class="card-image island-image-excursions"></span>
          <span class="card-label">
            <span class="card-icon" aria-hidden="true">
              <svg viewBox="0 0 48 48">
                <path d="M14 35c3-8 8-13 15-16M25 19l5 5M18 27l5 5" />
                <circle cx="31" cy="15" r="4" />
                <path d="M11 38h26M13 35l-3-8 8 3M28 20l5 11 7 2" />
              </svg>
            </span>
            <span>Excursions</span>
          </span>
        </a>

        <a class="aulani-card" href="#golf">
          <span class="card-image island-image-golf"></span>
          <span class="card-label">
            <span class="card-icon" aria-hidden="true">
              <svg viewBox="0 0 48 48">
                <circle cx="24" cy="18" r="9" />
                <path d="M24 27v12M18 39h12M20 18c3-3 6-3 9 0" />
              </svg>
            </span>
            <span>Golf</span>
          </span>
        </a>

        <a class="aulani-card" href="#shopping-around-oahu">
          <span class="card-image island-image-shopping"></span>
          <span class="card-label">
            <span class="card-icon" aria-hidden="true">
              <svg viewBox="0 0 48 48">
                <path d="M13 21h22l-2 18H15l-2-18Z" />
                <path d="M19 21v-4a5 5 0 0 1 10 0v4" />
              </svg>
            </span>
            <span>Shopping Around Oahu</span>
          </span>
        </a>
      </section>
    </main>
  </body>
</html>
